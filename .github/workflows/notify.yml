name: Kyonet Notify

on:
  schedule:
    - cron: '0 23 * * *'  # JST 08:00
    - cron: '0 11 * * *'  # JST 20:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node notify.js
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
    steps:
      - uses: actions/checkout@v4

      - name: Run script
        working-directory: ./
        run: node notify.js
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
